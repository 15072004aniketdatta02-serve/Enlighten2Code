syntax = "proto3";

package enlighten2code;

// ─── Code Execution Service ────────────────────────────────
// Used by CLI tools, microservices, or internal callers to
// execute code via gRPC instead of the REST API.

service CodeExecutionService {
  rpc Execute (ExecuteRequest) returns (ExecuteResponse);
  rpc GetStatus (StatusRequest) returns (StatusResponse);
}

service HealthService {
  rpc Check (HealthCheckRequest) returns (HealthCheckResponse);
}

// ─── Messages ──────────────────────────────────────────────

message ExecuteRequest {
  string source_code  = 1;
  int32  language_id  = 2;
  repeated string stdin = 3;
  repeated string expected_outputs = 4;
  string problem_id   = 5;
  string user_id      = 6;
}

message ExecuteResponse {
  bool   success     = 1;
  string job_id      = 2;  // BullMQ job ID (poll via GetStatus)
  string message     = 3;
}

message StatusRequest {
  string job_id = 1;
}

message StatusResponse {
  string job_id   = 1;
  string state    = 2;  // waiting | active | completed | failed
  int32  progress = 3;
  string result   = 4;  // JSON-serialised result
  string error    = 5;
}

message HealthCheckRequest {}

message HealthCheckResponse {
  string status = 1;  // SERVING | NOT_SERVING
}
